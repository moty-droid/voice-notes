name: Daily Summary & Email Report

on:
  schedule:
    # Every day at 00:05 UTC+8 (16:05 UTC previous day)
    - cron: '5 16 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get yesterday's date (UTC+8)
        id: date
        run: |
          DATE=$(TZ='Asia/Taipei' date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ='Asia/Taipei' date -v-1d '+%Y-%m-%d')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Processing date: $DATE"

      - name: Check if notes exist
        id: check
        run: |
          FILE="data/notes/${{ steps.date.outputs.date }}.json"
          if [ -f "$FILE" ]; then
            echo "has_notes=true" >> $GITHUB_OUTPUT
            echo "Found notes for ${{ steps.date.outputs.date }}"
          else
            echo "has_notes=false" >> $GITHUB_OUTPUT
            echo "No notes found for ${{ steps.date.outputs.date }}"
          fi

      - name: Generate AI summary
        if: steps.check.outputs.has_notes == 'true'
        id: summary
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          FILE="data/notes/${{ steps.date.outputs.date }}.json"
          NOTES=$(cat "$FILE")

          # Format notes for the prompt
          FORMATTED=$(echo "$NOTES" | python3 -c "
          import json, sys
          notes = json.load(sys.stdin)
          for n in sorted(notes, key=lambda x: x['timestamp']):
              t = n['timestamp'][11:16]
              print(f'[{t}] {n[\"text\"]}')
          ")

          # Call Claude API
          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -d "$(python3 -c "
          import json
          prompt = '''以下是我今天（${{ steps.date.outputs.date }}）的筆記記錄，請幫我整理成條列式摘要，用繁體中文。重點歸納，去除口語贅字，保留關鍵資訊。

          $FORMATTED'''
          print(json.dumps({
              'model': 'claude-sonnet-4-20250514',
              'max_tokens': 1024,
              'messages': [{'role': 'user', 'content': prompt}]
          }))
          ")")

          # Extract summary text
          SUMMARY=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if 'content' in data:
              print(data['content'][0]['text'])
          else:
              print('摘要產生失敗')
              sys.exit(1)
          ")

          # Save summary to file
          mkdir -p data/summaries
          echo "$SUMMARY" > "data/summaries/${{ steps.date.outputs.date }}.md"

          # Save for next step
          EOF_MARKER=$(openssl rand -hex 8)
          echo "text<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

      - name: Commit summary
        if: steps.check.outputs.has_notes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries/
          git diff --staged --quiet || git commit -m "summary: ${{ steps.date.outputs.date }}"
          git push

      - name: Send daily email
        if: steps.check.outputs.has_notes == 'true'
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
        run: |
          FILE="data/notes/${{ steps.date.outputs.date }}.json"
          SUMMARY_FILE="data/summaries/${{ steps.date.outputs.date }}.md"
          DATE="${{ steps.date.outputs.date }}"

          # Build email content
          CONTENT=$(python3 -c "
          import json

          with open('$FILE') as f:
              notes = json.load(f)

          summary = ''
          try:
              with open('$SUMMARY_FILE') as f:
                  summary = f.read().strip()
          except: pass

          lines = []
          lines.append('📋 隨手記日報（$DATE）')
          lines.append('')

          if summary:
              lines.append('【AI 摘要】')
              lines.append(summary)
              lines.append('')

          lines.append('【原始記錄】')
          for n in sorted(notes, key=lambda x: x['timestamp']):
              t = n['timestamp'][11:16]
              lines.append(f'  {t}  {n[\"text\"]}')

          print('\n'.join(lines))
          ")

          # Send via EmailJS
          python3 -c "
          import json, urllib.request

          payload = json.dumps({
              'service_id': '$EMAILJS_SERVICE_ID',
              'template_id': '$EMAILJS_TEMPLATE_ID',
              'user_id': '$EMAILJS_PUBLIC_KEY',
              'template_params': {
                  'to_email': '$USER_EMAIL',
                  'subject': '隨手記日報 $DATE',
                  'message': '''$CONTENT'''
              }
          }).encode()

          req = urllib.request.Request(
              'https://api.emailjs.com/api/v1.0/email/send',
              data=payload,
              headers={'Content-Type': 'application/json'}
          )
          resp = urllib.request.urlopen(req)
          print(f'Email sent: {resp.status}')
          "
