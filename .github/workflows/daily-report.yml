name: Daily Summary & Email Report

on:
  schedule:
    # Every day at 00:05 UTC+8 (16:05 UTC previous day)
    - cron: '5 16 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get yesterday's date (UTC+8)
        id: date
        run: |
          DATE=$(TZ='Asia/Taipei' date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ='Asia/Taipei' date -v-1d '+%Y-%m-%d')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Processing date: $DATE"

      - name: Check if notes exist
        id: check
        run: |
          FILE="data/notes/${{ steps.date.outputs.date }}.json"
          if [ -f "$FILE" ]; then
            echo "has_notes=true" >> $GITHUB_OUTPUT
            echo "Found notes for ${{ steps.date.outputs.date }}"
          else
            echo "has_notes=false" >> $GITHUB_OUTPUT
            echo "No notes found for ${{ steps.date.outputs.date }}"
          fi

      - name: Generate AI summary
        if: steps.check.outputs.has_notes == 'true'
        id: summary
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          FILE="data/notes/${{ steps.date.outputs.date }}.json"
          NOTES=$(cat "$FILE")

          # Format notes for the prompt
          FORMATTED=$(echo "$NOTES" | python3 -c "
          import json, sys
          notes = json.load(sys.stdin)
          for n in sorted(notes, key=lambda x: x['timestamp']):
              t = n['timestamp'][11:16]
              print(f'[{t}] {n[\"text\"]}')
          ")

          # Call Claude API
          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -d "$(python3 -c "
          import json
          prompt = '''以下是我今天（${{ steps.date.outputs.date }}）的筆記記錄，請幫我整理成條列式摘要，用繁體中文。重點歸納，去除口語贅字，保留關鍵資訊。

          $FORMATTED'''
          print(json.dumps({
              'model': 'claude-sonnet-4-20250514',
              'max_tokens': 1024,
              'messages': [{'role': 'user', 'content': prompt}]
          }))
          ")")

          # Extract summary text
          SUMMARY=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if 'content' in data:
              print(data['content'][0]['text'])
          else:
              print('摘要產生失敗')
              sys.exit(1)
          ")

          # Save summary to file
          mkdir -p data/summaries
          echo "$SUMMARY" > "data/summaries/${{ steps.date.outputs.date }}.md"

          # Save for next step
          EOF_MARKER=$(openssl rand -hex 8)
          echo "text<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

      - name: Commit summary
        if: steps.check.outputs.has_notes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries/
          git diff --staged --quiet || git commit -m "summary: ${{ steps.date.outputs.date }}"
          git push

      - name: Send daily email
        if: steps.check.outputs.has_notes == 'true'
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DATE: ${{ steps.date.outputs.date }}
        run: |
          export FILE="data/notes/${DATE}.json"
          export SUMMARY_FILE="data/summaries/${DATE}.md"

          python3 << 'PYEOF'
          import json, smtplib, os
          from email.mime.text import MIMEText

          date = os.environ["DATE"]
          email = os.environ["USER_EMAIL"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          with open(os.environ["FILE"]) as f:
              notes = json.load(f)

          summary = ""
          try:
              with open(os.environ["SUMMARY_FILE"]) as f:
                  summary = f.read().strip()
          except:
              pass

          lines = [f"隨手記日報（{date}）", ""]
          if summary:
              lines += ["【AI 摘要】", summary, ""]
          lines.append("【原始記錄】")
          for n in sorted(notes, key=lambda x: x["timestamp"]):
              t = n["timestamp"][11:16]
              lines.append(f"  {t}  {n['text']}")

          content = "\n".join(lines)

          msg = MIMEText(content, "plain", "utf-8")
          msg["Subject"] = f"隨手記日報 {date}"
          msg["From"] = email
          msg["To"] = email

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(email, password)
              s.send_message(msg)
          print("Email sent successfully")
          PYEOF
